syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.jshubham.ftpservice.autogenerated";

package ftpservice;

// The FTP Service definition
service FTPService {

  // Deletes a file in the destination directory of server
  rpc deleteFile (MetaData) returns (Result) {};

  // Adds a file in the destination directory of server
  rpc addFile(stream AddFileRequest) returns (Result) {};

  // Reads a file from the destination directory of the server.
  rpc readFile (MetaData) returns (stream ReadFileResult) {};

}

// message types
message MetaData {
  string name = 1;
}

message FileChuck {
  bytes content = 1;
  bytes checksum = 2;
}

message AddFileRequest {
  oneof request {
    MetaData metadata = 1;
    FileChuck fileChuck = 2;
  }
}

// enum type
enum Status {
  SUCCESS = 0;
  FAILED = 1;
  IN_PROGRESS = 2;
  FILE_NOT_PRESENT = 3;
  CANT_DELETE_DIR = 4;
  METADATA_MISSING = 5;
  CANT_ADD_FILE_WITHOUT_NAME = 6;
  CHECKSUM_MISMATCH = 7;
  ATOMIC_FILE_MOVE_FAILED = 8;
}

// The response message containing the greetings
message Result {
  string message = 1;
  Status status = 2;
}

message ReadFileResult {
  oneof request {
    string message = 1;
    FileChuck fileChuck = 2;

  }
}